# use purty colors
set-option -g default-terminal "screen-256color"

# enable mouse, for now
set -g mode-mouse on

# rebind prefix to Ctrl-A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

setw -g xterm-keys on

# use vim keybindings for navigation
setw -g mode-keys vi set -g status-keys vi bind-key -t vi-edit Up history-up bind-key -t vi-edit Down history-down

